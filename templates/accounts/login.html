<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login | PCify</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
	<div class="w-full max-w-md bg-white rounded-xl shadow p-6">
		<h1 class="text-2xl font-bold mb-4">Login</h1>
		{% if message %}
			<p class="mb-3 text-sm text-red-600">{{ message }}</p>
		{% endif %}
		<form method="post" class="space-y-3">
			{% csrf_token %}
			<div>
				<label class="block text-sm mb-1">Email</label>
				<input name="email" type="email" value="{{ email|default:'' }}" class="w-full border rounded px-3 py-2" required>
			</div>
			<div>
				<label class="block text-sm mb-1">Password</label>
				<input name="password" type="password" class="w-full border rounded px-3 py-2" required>
			</div>
			<label class="flex items-center gap-2 text-sm">
				<input name="remember" type="checkbox" value="1">
				Remember me
			</label>
			<button type="submit" class="w-full bg-slate-900 text-white rounded px-3 py-2">Sign in</button>
		</form>
		<p class="mt-4 text-sm">No account? <a href="{% url 'account:signup' %}" class="text-blue-600">Create one</a></p>
		<p class="mt-2 text-sm"><a href="{% url 'main:home' %}" class="text-slate-600">Back to home</a></p>
	</div>
</body>
</html>
